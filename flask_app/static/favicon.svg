<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>

  <!-- ── Skeleton lines (white, semi-opaque for depth) ────────────────── -->
  <g stroke="rgba(255,255,255,0.75)" stroke-linecap="round" stroke-linejoin="round">
    <!-- neck -->
    <line x1="16" y1="8"  x2="16" y2="11" stroke-width="1.6"/>
    <!-- shoulders -->
    <line x1="9"  y1="11" x2="23" y2="11" stroke-width="1.6"/>
    <!-- torso -->
    <line x1="16" y1="11" x2="16" y2="20" stroke-width="1.6"/>
    <!-- hips -->
    <line x1="12" y1="20" x2="20" y2="20" stroke-width="1.6"/>
    <!-- left arm raised -->
    <line x1="9"  y1="11" x2="5"  y2="7"  stroke-width="1.4"/>
    <line x1="5"  y1="7"  x2="3"  y2="4"  stroke-width="1.4"/>
    <!-- right arm extended -->
    <line x1="23" y1="11" x2="27" y2="15" stroke-width="1.4"/>
    <line x1="27" y1="15" x2="29" y2="19" stroke-width="1.4"/>
    <!-- left leg straight down -->
    <line x1="12" y1="20" x2="10" y2="27" stroke-width="1.4"/>
    <line x1="10" y1="27" x2="9"  y2="30" stroke-width="1.4"/>
    <!-- right leg, slightly kicked out -->
    <line x1="20" y1="20" x2="23" y2="26" stroke-width="1.4"/>
    <line x1="23" y1="26" x2="25" y2="30" stroke-width="1.4"/>
  </g>

  <!-- ── Landmark dots (solid white) ──────────────────────────────────── -->
  <g fill="white">
    <!-- head -->
    <circle cx="16" cy="5.5" r="2.8"/>
    <!-- shoulders -->
    <circle cx="9"  cy="11"  r="1.7"/>
    <circle cx="23" cy="11"  r="1.7"/>
    <!-- elbows -->
    <circle cx="5"  cy="7"   r="1.4"/>
    <circle cx="27" cy="15"  r="1.4"/>
    <!-- wrists -->
    <circle cx="3"  cy="4"   r="1.2"/>
    <circle cx="29" cy="19"  r="1.2"/>
    <!-- hips -->
    <circle cx="12" cy="20"  r="1.5"/>
    <circle cx="20" cy="20"  r="1.5"/>
    <!-- knees -->
    <circle cx="10" cy="27"  r="1.3"/>
    <circle cx="23" cy="26"  r="1.3"/>
    <!-- ankles/feet -->
    <circle cx="9"  cy="30"  r="1.1"/>
    <circle cx="25" cy="30"  r="1.1"/>
  </g>
</svg>
